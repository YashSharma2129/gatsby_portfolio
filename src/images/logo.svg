<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagon background -->
  <polygon points="50,5 85,25 85,75 50,95 15,75 15,25" 
           fill="none" 
           stroke="#64ffda" 
           stroke-width="2"/>
  
  <!-- Letter Y -->
  <g stroke="#64ffda" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left diagonal line -->
    <line x1="35" y1="25" x2="50" y2="50"/>
    <!-- Right diagonal line -->
    <line x1="65" y1="25" x2="50" y2="50"/>
    <!-- Vertical line -->
    <line x1="50" y1="50" x2="50" y2="75"/>
  </g>
</svg>
